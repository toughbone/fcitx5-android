# t9_pinyin.schema.yaml
schema:
  schema_id: t9_pinyin
  name: "九宫格拼音"
  version: "1.0"
  author: "zyl"
  description: "适配 Android UI 的九键拼音方案"

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: simplification
    reset: 1             # 强制初始状态为简体
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniqueness

speller:
  alphabet: "23456789'" # 允许字母进入编码区
  initials: "23456789"
  delimiter: " '"       # 明确指定分词符包含单引号
  # 核心逻辑：拼写运算，将所有拼音字母映射到数字键
  algebra:
    - xform/[abc]/2/
    - xform/[def]/3/
    - xform/[ghi]/4/
    - xform/[jkl]/5/
    - xform/[mno]/6/
    - xform/[pqrs]/7/
    - xform/[tuv]/8/
    - xform/[wxyz]/9/
    # 2. 【关键修正】消除词库拼音中的空格，使长词能被连续的数字匹配
    - xform/\s//

    # 3. 简拼支持（保留一个即可，你之前重复写了两遍）
    - abbrev/^([2-9]).+$/$1/

translator:
  dictionary: luna_pinyin.extended  # 让九键方案指向你刚创建的这个“总表”  # 确保你的 build 目录有 luna_pinyin 相关文件
  enable_user_dict: true         # 开启用户词典，记住宅住你的输入习惯
  enable_sentence: true          # 开启整句连打（非常重要）
  enable_encoder: true           # 开启自动造词
  encode_commit_history: true    # 对上屏的词进行自动加权
  enable_completion: true        # 提前显示匹配的词
  initial_quality: 100       # 提高初始权重
  preedit_format:
    # 让输入框显示的不是一串数字，而是对应的模糊字母，方便对齐
    - xlit/23456789/ABCDEFGHI/

simplifier:
  opencc_config: t2s.json  # 注意：这里改用 t2s.json (Traditional to Simplified)
  option_name: simplification

# 针对 Android 物理键或 UI 逻辑的简单处理
key_binder:
  import_preset: default

punctuator:
  import_preset: default
  full_shape:
    "'": "'"  # 强制全角模式下也输出半角引号
  half_shape:
    "'": "'"  # 强制半角模式下输出半角引号
  use_default_configs: false
  symbols:
    "'": "'"