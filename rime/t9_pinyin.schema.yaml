# t9_pinyin.schema.yaml
schema:
  schema_id: t9_pinyin
  name: "九宫格拼音"
  version: "1.0"
  author: "Custom"
  description: "适配 Android UI 的九键拼音方案"

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: simplification
    reset: 1             # 强制初始状态为简体
    states: [ 漢字, 汉字 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - simplifier
    - uniqueness

speller:
  alphabet: "23456789abcdefghijklmnopqrstuvwxyz'" # 允许字母进入编码区
  initials: "23456789"
  delimiter: " '"       # 明确指定分词符包含单引号
  # 核心逻辑：拼写运算，将所有拼音字母映射到数字键
  algebra:
    - xform/[abc]/2/
    - xform/[def]/3/
    - xform/[ghi]/4/
    - xform/[jkl]/5/
    - xform/[mno]/6/
    - xform/[pqrs]/7/
    - xform/[tuv]/8/
    - xform/[wxyz]/9/
    # 简拼支持：允许只输入每个字的首个数字
    - abbrev/^([2-9]).+$/$1/

translator:
  dictionary: luna_pinyin  # 确保你的 build 目录有 luna_pinyin 相关文件
  enable_user_dict: true     # 开启用户词典，它会学习你的输入习惯，常用的词排在前面
  enable_sentence: true      # 开启整句连打
  preedit_format:
    # 让输入框显示的不是一串数字，而是对应的模糊字母，方便对齐
    - xlit/23456789/ABCDEFGHI/

simplifier:
  opencc_config: t2s.json  # 注意：这里改用 t2s.json (Traditional to Simplified)
  option_name: simplification

# 针对 Android 物理键或 UI 逻辑的简单处理
key_binder:
  import_preset: default

punctuator:
  import_preset: default
  full_shape:
    "'": "'"  # 强制全角模式下也输出半角引号
  half_shape:
    "'": "'"  # 强制半角模式下输出半角引号
  use_default_configs: false
  symbols:
    "'": "'"